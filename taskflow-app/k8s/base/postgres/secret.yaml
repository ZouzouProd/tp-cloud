apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: staging
type: Opaque
stringData:
  POSTGRES_DB: taskflow
  POSTGRES_USER: taskflow
  POSTGRES_PASSWORD: replace_with_a_strong_password
  DATABASE_URL: postgresql://taskflow:replace_with_a_strong_password@postgres:5432/taskflow
  JWT_SECRET: replace_with_a_strong_jwt_secret
