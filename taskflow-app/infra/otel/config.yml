receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Envoi des traces vers Tempo via OTLP gRPC (plus performant qu'HTTP)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Export console pour déboguer (collector-contrib: debug exporter)
  debug:
    verbosity: detailed

  # Expose les métriques (issues des services) au format Prometheus (pull)
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  telemetry:
    metrics:
      # Métriques internes du collector (scrapées par Prometheus)
      address: 0.0.0.0:8888

  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
